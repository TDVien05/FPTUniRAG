<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-surface-container-low text-on-surface font-body-md min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop overflow-x-hidden">
<main class="w-full max-w-[440px] flex flex-col gap-8 animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Branding Header -->
<div class="text-center space-y-2">
<div class="inline-flex items-center justify-center p-3 rounded-xl bg-surface-container-lowest border border-outline-variant mb-2 shadow-sm">
<span class="material-symbols-outlined text-[#F26F21] text-[40px]" style='font-variation-settings: "FILL" 1;'>school</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface tracking-tight">FPT UniRAG</h1>
<p class="font-label-md text-label-md text-on-surface-variant tracking-widest uppercase">Academic AI Assistant</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-8 shadow-sm">
<div class="flex gap-2 justify-center mb-6">
<span class="inline-flex items-center rounded-full bg-surface-container border border-outline-variant px-2.5 py-0.5 font-label-sm text-label-sm text-on-surface-variant">Student</span>
<span class="inline-flex items-center rounded-full bg-surface-container border border-outline-variant px-2.5 py-0.5 font-label-sm text-label-sm text-on-surface-variant">Teacher</span>
<span class="inline-flex items-center rounded-full bg-surface-container border border-outline-variant px-2.5 py-0.5 font-label-sm text-label-sm text-on-surface-variant">Admin</span>
</div>
<form class="space-y-6" id="loginForm" onsubmit="return false;">
<!-- Identity Input -->
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface" for="username">Email</label>
<div class="relative">
<input class="w-full px-3 py-2 bg-surface-container-lowest border border-outline-variant rounded-md focus:ring-2 focus:ring-[#F26F21] focus:border-[#F26F21] transition-all outline-none text-body-md placeholder:text-on-surface-variant" id="username" name="username" placeholder="student@fpt.edu.vn" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-[#F26F21] hover:underline decoration-2 underline-offset-4" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full px-3 py-2 pr-10 bg-surface-container-lowest border border-outline-variant rounded-md focus:ring-2 focus:ring-[#F26F21] focus:border-[#F26F21] transition-all outline-none text-body-md placeholder:text-on-surface-variant" id="password" name="password" placeholder="Enter your password" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-body-md">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center space-x-2">
<input class="h-4 w-4 rounded border-outline-variant text-[#F26F21] focus:ring-[#F26F21]" id="remember" type="checkbox"/>
<label class="font-label-md text-label-md text-on-surface font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70" for="remember">
                        Remember me
                    </label>
</div>
<!-- Sign In Button -->
<button class="w-full py-2 px-4 bg-[#F26F21] text-white font-label-md text-label-md rounded-md hover:bg-[#F26F21]/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-sm font-medium" type="submit">
                    Sign in
                </button>
</form>
<!-- Divider -->
<div class="relative my-6">
<div class="absolute inset-0 flex items-center">
<span class="w-full border-t border-outline-variant"></span>
</div>
<div class="relative flex justify-center text-label-sm">
<span class="px-2 bg-surface-container-lowest text-on-surface-variant">or continue with</span>
</div>
</div>
<!-- SSO Options -->
<button class="w-full py-2 px-4 bg-surface-container-lowest border border-outline-variant text-on-surface font-label-md text-label-md rounded-md hover:bg-surface-container transition-all flex items-center justify-center gap-2 font-medium" type="button">
                Continue with FPT account
            </button>
</div>
<!-- Footer Help -->
<div class="text-center">
<p class="font-body-md text-on-surface-variant text-sm mb-4">New to FPT UniRAG? Contact your administrator</p>
<div class="flex items-center justify-center gap-4">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-on-surface transition-colors underline underline-offset-4" href="#">Privacy Policy</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-on-surface transition-colors underline underline-offset-4" href="#">Support</a>
</div>
</div>
</main>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('loginForm');
            const submitBtn = form.querySelector('button[type="submit"]');
            
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const originalText = submitBtn.innerHTML;
                // Visual feedback for interaction
                submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin text-body-md">sync</span> Signing in...';
                submitBtn.classList.add('opacity-80', 'pointer-events-none');
                
                // Simulate delay
                setTimeout(() => {
                    submitBtn.innerHTML = originalText;
                    submitBtn.classList.remove('opacity-80', 'pointer-events-none');
                }, 2000);
            });

            const visibilityBtn = document.querySelector('button[type="button"]');
            const passwordInput = document.getElementById('password');
            if (visibilityBtn && passwordInput) {
                visibilityBtn.addEventListener('click', () => {
                    const icon = visibilityBtn.querySelector('.material-symbols-outlined');
                    if (passwordInput.type === 'password') {
                        passwordInput.type = 'text';
                        icon.textContent = 'visibility_off';
                    } else {
                        passwordInput.type = 'password';
                        icon.textContent = 'visibility';
                    }
                });
            }
        });
    </script>
