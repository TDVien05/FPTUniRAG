services:
  postgres:
    image: postgres:17-alpine
    container_name: fptunirag-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "54329:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./create_database.sql:/docker-entrypoint-initdb.d/01-create_database.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prn222"]
      interval: 5s
      timeout: 5s
      retries: 20
  qdrant:
    image: qdrant/qdrant:latest
    container_name: fptunirag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
      - ./qdrant/production.yaml:/qdrant/config/production.yaml:ro

volumes:
  postgres-data:
  qdrant-data:
